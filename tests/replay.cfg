# ============================================================================
# replay.cfg -- config for the offline fixture regression suite (plan 13, D32).
# ----------------------------------------------------------------------------
# Committable: carries NO host, NO username, NO secrets, NO site data. --replay
# never issues HTTP, so host/auth are intentionally blank. page_count MUST match
# the re-pagination in build_fixtures.py (PAGE_COUNT) so the trimmed LDEV pages
# are walked exactly as captured.
# ============================================================================

[target]
host            =
prefix_override =
model_override  =

[auth]
username        =

[capture]
page_count      = 64
phases          = all
raw_never_written = false

[output]
capture_dir     =
mapping_dir     =

[tuneables]
http_timeout_s  = 30
retries         = 3
concurrency     = 1
